<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Y N Hosakote Community Feed</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
darkMode:"class",
theme:{
extend:{
colors:{
primary:"#0f49bd",
secondary:"#16a34a",
"background-light":"#f6f6f8",
"background-dark":"#101622"
},
fontFamily:{display:["Lexend","sans-serif"]}
}
}
}
</script>

<style>
body{font-family:'Lexend',sans-serif;}
</style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen pb-24">

<!-- AUTH LOADER -->
<div id="authLoader" class="fixed inset-0 bg-white flex items-center justify-center z-50">
<div class="text-center">
<div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-300 border-t-gray-900 mx-auto"></div>
<p class="mt-4 text-gray-600">Checking login...</p>
</div>
</div>

<!-- HEADER -->
<header class="sticky top-0 z-40 bg-white shadow-sm border-b px-4 py-3 flex justify-between items-center">
<h1 class="font-bold text-primary text-lg">Y N Hosakote Feed</h1>
<button onclick="logout()" class="text-sm text-red-500 font-semibold">Logout</button>
</header>

<!-- FEED CONTAINER -->
<main id="feed" class="p-4 space-y-4 max-w-2xl mx-auto"></main>

<!-- FAB -->
<button onclick="window.location='create-post.html'"
class="fixed bottom-24 right-4 z-50 h-16 w-16 bg-secondary text-white rounded-full shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">add</span>
</button>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
getAuth, 
onAuthStateChanged, 
signOut 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
getFirestore,
collection,
query,
orderBy,
onSnapshot,
doc,
updateDoc,
addDoc,
serverTimestamp,
where,
getDocs,
deleteDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyCpNAu49OymCjNuRl7aRBRYQm0P6M0db0s",
authDomain:"ynhosakote-community.firebaseapp.com",
projectId:"ynhosakote-community",
storageBucket:"ynhosakote-community.firebasestorage.app",
messagingSenderId:"1053474727552",
appId:"1:1053474727552:web:9ed2d6523ef935fd666865"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser;
const feed=document.getElementById("feed");

/* AUTH GUARD */
onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location="citizen_login.html";
return;
}

currentUser=user;

/* CHECK APPROVAL */
const userDoc=await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists() || userDoc.data().approved!==true){
await signOut(auth);
alert("Account not approved");
window.location="citizen_login.html";
return;
}

document.getElementById("authLoader").style.display="none";
loadPosts();

});

/* LOAD POSTS */
function loadPosts(){

const q=query(collection(db,"posts"),orderBy("createdAt","desc"));

onSnapshot(q,(snapshot)=>{
feed.innerHTML="";

snapshot.forEach(docSnap=>{

const p=docSnap.data();
const id=docSnap.id;

feed.innerHTML+=`

<article class="bg-white rounded-2xl shadow border overflow-hidden">

<div class="p-4">
<h3 class="font-bold text-base">${p.authorName||"Member"}</h3>
<p class="text-sm text-gray-500">${p.createdAt?.toDate().toLocaleString()||""}</p>
<p class="mt-2 text-gray-800">${p.text||""}</p>
${p.imageUrl?`<img src="${p.imageUrl}" class="mt-3 rounded-xl w-full">`:""}
</div>

<div class="px-4 py-2 border-t flex justify-between text-sm text-gray-500">
<span>${p.likeCount||0} Likes</span>
</div>

<div class="flex border-t">
<button onclick="likePost('${id}',${p.likeCount||0})" class="flex-1 py-3 font-semibold">👍 Like</button>
<button onclick="commentPost('${id}')" class="flex-1 py-3 font-semibold">💬 Comment</button>
<button onclick="reportPost('${id}')" class="flex-1 py-3 font-semibold text-red-500">🚩 Report</button>
</div>

</article>
`;

});
});
}

/* LIKE */
window.likePost=async(postId,count)=>{

const likeQuery=query(collection(db,"likes"),
where("postId","==",postId),
where("uid","==",currentUser.uid));

const likeSnap=await getDocs(likeQuery);

if(likeSnap.empty){

await addDoc(collection(db,"likes"),{
postId:postId,
uid:currentUser.uid
});

await updateDoc(doc(db,"posts",postId),{
likeCount:count+1
});

}else{

likeSnap.forEach(async(d)=>{
await deleteDoc(doc(db,"likes",d.id));
});

await updateDoc(doc(db,"posts",postId),{
likeCount:count-1
});
}
};

/* COMMENT */
window.commentPost=async(postId)=>{
const text=prompt("Enter comment");
if(!text) return;

await addDoc(collection(db,"comments"),{
postId:postId,
uid:currentUser.uid,
authorName:currentUser.email,
text:text,
createdAt:serverTimestamp()
});
};

/* REPORT */
window.reportPost=async(postId)=>{
const reason=prompt("Report reason?");
if(!reason) return;

await addDoc(collection(db,"reports"),{
postId:postId,
reporterUid:currentUser.uid,
reason:reason,
createdAt:serverTimestamp()
});

alert("Reported to admin");
};

/* LOGOUT */
window.logout=async()=>{
await signOut(auth);
window.location="citizen_login.html";
};

</script>
</body>
</html>
