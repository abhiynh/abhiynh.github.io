<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y N Hosakote – Membership Registration</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body{
  font-family:'Lexend',sans-serif;
  background:linear-gradient(135deg,#e7eef9,#dbe6f7);
}
.material-symbols-outlined{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48;
}
.fade-in{
  animation:fadeIn .25s ease forwards;
}
@keyframes fadeIn{
  from{opacity:0; transform:scale(.95)}
  to{opacity:1; transform:scale(1)}
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6">

<h2 class="text-2xl font-bold mb-6 text-center text-gray-800">
Membership Registration
</h2>

<div class="space-y-5">

<!-- Name -->
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-blue-500">person</span>
<input id="name" placeholder="Full Name"
class="w-full border border-gray-300 pl-10 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
</div>

<!-- Email -->
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-green-500">mail</span>
<input id="email" type="email" placeholder="Email Address"
class="w-full border border-gray-300 pl-10 py-3 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
</div>

<!-- Aadhaar -->
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-orange-500">badge</span>
<input id="aadhaar" type="text" maxlength="12" placeholder="Aadhaar Number (12 digits)"
class="w-full border border-gray-300 pl-10 py-3 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
</div>

<!-- Password -->
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-purple-500">lock</span>
<input id="password" type="password" placeholder="Minimum 6 characters"
class="w-full border border-gray-300 pl-10 pr-10 py-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
<button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-gray-500">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>

<button id="registerBtn"
class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-semibold shadow-lg">
Submit Membership Request
</button>

</div>
</div>

<!-- DIALOG -->
<div id="dialogBox" class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50">
<div class="bg-white rounded-2xl shadow-2xl p-6 w-[90%] max-w-sm text-center fade-in">
<div id="dialogIcon" class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4">
<span id="dialogIconSymbol" class="material-symbols-outlined text-4xl"></span>
</div>
<h3 id="dialogTitle" class="text-xl font-bold mb-2"></h3>
<p id="dialogMessage" class="text-gray-600 text-sm mb-6"></p>
<button onclick="closeDialog()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">OK</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpNAu49OymCjNuRl7aRBRYQm0P6M0db0s",
  authDomain: "ynhosakote-community.firebaseapp.com",
  projectId: "ynhosakote-community",
  storageBucket: "ynhosakote-community.firebasestorage.app",
  messagingSenderId: "1053474727552",
  appId: "1:1053474727552:web:9ed2d6523ef935fd666865"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.closeDialog = () => {
document.getElementById("dialogBox").classList.add("hidden");
};

function showDialog(type,title,message){
const box=document.getElementById("dialogBox");
const icon=document.getElementById("dialogIcon");
const symbol=document.getElementById("dialogIconSymbol");

document.getElementById("dialogTitle").innerText=title;
document.getElementById("dialogMessage").innerText=message;

if(type==="success"){
icon.className="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-green-100";
symbol.innerText="check_circle";
symbol.className="material-symbols-outlined text-4xl text-green-600";
}
if(type==="error"){
icon.className="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-red-100";
symbol.innerText="error";
symbol.className="material-symbols-outlined text-4xl text-red-600";
}

box.classList.remove("hidden");
box.classList.add("flex");
}

window.togglePassword=()=>{
const input=document.getElementById("password");
input.type=input.type==="password"?"text":"password";
};

document.getElementById("registerBtn").onclick = async () => {

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const aadhaar = document.getElementById("aadhaar").value.trim();
const password = document.getElementById("password").value.trim();

if(!name || !email || !aadhaar || !password){
showDialog("error","Form Error","All fields are required.");
return;
}

if(!/^\d{12}$/.test(aadhaar)){
showDialog("error","Invalid Aadhaar","Aadhaar must be exactly 12 digits.");
return;
}

try{

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const user = userCred.user;

await sendEmailVerification(user);

await setDoc(doc(db,"users",user.uid),{
name,
email,
aadhaar,
role:"member",
approved:false,
emailVerified:false,
createdAt:serverTimestamp()
});

await signOut(auth);

showDialog("success","Verify Email",
"Verification link sent to your email. Please verify before login.");

}catch(e){

showDialog("error","Registration Failed",e.message);

}

};

/* AUTO REDIRECT AFTER APPROVAL */
onAuthStateChanged(auth, async(user)=>{
if(user){
if(!user.emailVerified){
showDialog("error","Email Not Verified","Please verify your email first.");
await signOut(auth);
return;
}

const docSnap = await getDoc(doc(db,"users",user.uid));
if(docSnap.exists()){
const data = docSnap.data();

if(data.approved === true){
window.location.href="homepage.html";
}else{
showDialog("error","Pending Approval","Your account is waiting for admin approval.");
await signOut(auth);
}
}
}
});

</script>
</body>
</html>
