<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y N Hosakote – Membership Registration</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body{
  font-family:'Lexend',sans-serif;
  background:linear-gradient(135deg,#e7eef9,#dbe6f7);
}
.material-symbols-outlined{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48;
}
.fade-in{
  animation:fadeIn .25s ease forwards;
}
@keyframes fadeIn{
  from{opacity:0; transform:scale(.95)}
  to{opacity:1; transform:scale(1)}
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-5">

<h2 class="text-2xl font-bold text-center">Membership Request</h2>

<input id="name" placeholder="Full Name"
class="w-full border px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">

<input id="email" type="email" placeholder="Email Address"
class="w-full border px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">

<input id="password" type="password" placeholder="Password"
class="w-full border px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">

<button id="registerBtn"
class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold">
Submit Request
</button>

</div>

<!-- DIALOG BOX -->
<div id="dialogBox" class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50 px-4">
  <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center fade-in">

    <div id="dialogIcon"
    class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4">
      <span id="dialogIconSymbol"
      class="material-symbols-outlined text-4xl"></span>
    </div>

    <h3 id="dialogTitle" class="text-xl font-bold mb-2"></h3>
    <p id="dialogMessage" class="text-gray-600 text-sm mb-6"></p>

    <button onclick="closeDialog()"
    class="bg-blue-600 text-white px-6 py-2 rounded-lg">
      OK
    </button>

  </div>
</div>

<!-- PROGRESS BOX -->
<div id="progressBox"
class="fixed inset-0 hidden items-center justify-center bg-black/40 backdrop-blur-sm z-50">

  <div class="bg-white rounded-2xl shadow-2xl p-8 text-center w-[90%] max-w-sm fade-in">

    <div class="relative mx-auto w-20 h-20 mb-5">
      <div class="absolute inset-0 rounded-full border-4 border-blue-200"></div>
      <div class="absolute inset-0 rounded-full border-4 border-blue-600 border-t-transparent animate-spin"></div>
      <span class="material-symbols-outlined absolute inset-0 flex items-center justify-center text-blue-600 text-3xl">
        cloud_upload
      </span>
    </div>

    <h3 id="progressTitle" class="text-lg font-bold mb-2">
      Processing
    </h3>

    <p id="progressText" class="text-gray-600 text-sm">
      Please wait...
    </p>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpNAu49OymCjNuRl7aRBRYQm0P6M0db0s",
  authDomain: "ynhosakote-community.firebaseapp.com",
  projectId: "ynhosakote-community",
  storageBucket: "ynhosakote-community.firebasestorage.app",
  messagingSenderId: "1053474727552",
  appId: "1:1053474727552:web:9ed2d6523ef935fd666865"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* Dialog Controls */
window.closeDialog = ()=>{
document.getElementById("dialogBox").classList.add("hidden");
};

function showDialog(type,title,message){

const box=document.getElementById("dialogBox");
const icon=document.getElementById("dialogIcon");
const symbol=document.getElementById("dialogIconSymbol");

document.getElementById("dialogTitle").innerText=title;
document.getElementById("dialogMessage").innerText=message;

if(type==="success"){
icon.className="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-green-100";
symbol.innerText="check_circle";
symbol.className="material-symbols-outlined text-4xl text-green-600";
}

if(type==="error"){
icon.className="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-red-100";
symbol.innerText="error";
symbol.className="material-symbols-outlined text-4xl text-red-600";
}

box.classList.remove("hidden");
box.classList.add("flex");
}

/* Progress Controls */
function showProgress(title,text){
document.getElementById("progressTitle").innerText=title;
document.getElementById("progressText").innerText=text;
document.getElementById("progressBox").classList.remove("hidden");
document.getElementById("progressBox").classList.add("flex");
}

function hideProgress(){
document.getElementById("progressBox").classList.add("hidden");
}

/* Register */
document.getElementById("registerBtn").onclick=async()=>{

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!name||!email||!password){
showDialog("error","Form Error","Please fill all required fields.");
return;
}

try{

showProgress("Connecting to Firebase","Creating authentication record...");

const userCred=await createUserWithEmailAndPassword(auth,email,password);
const user=userCred.user;

showProgress("Saving to Firebase","Writing user profile to Firestore...");

await setDoc(doc(db,"users",user.uid),{
name:name,
email:email,
role:"member",
approved:false,
createdAt:serverTimestamp()
});

await signOut(auth);

hideProgress();

showDialog("success","Firebase Success",
"Account successfully created and stored in Firebase database.");

}catch(e){

hideProgress();

/* Custom Firebase Error Handling */
let customMessage="Firebase Error: ";

switch(e.code){

case "auth/email-already-in-use":
customMessage+="This email is already registered in Firebase.";
break;

case "auth/invalid-email":
customMessage+="Invalid email format detected by Firebase.";
break;

case "auth/weak-password":
customMessage+="Password is too weak according to Firebase security rules.";
break;

case "auth/network-request-failed":
customMessage+="Network issue while connecting to Firebase servers.";
break;

default:
customMessage+=e.message;
}

showDialog("error","Firebase Registration Failed",customMessage);

}

};

</script>

</body>
</html>
