<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y N Hosakote – Membership Registration</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body{
  font-family:'Lexend',sans-serif;
  background:linear-gradient(135deg,#e7eef9,#dbe6f7);
}
.material-symbols-outlined{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48;
}
.fade-in{
  animation:fadeIn .25s ease forwards;
}
@keyframes fadeIn{
  from{opacity:0; transform:scale(.95)}
  to{opacity:1; transform:scale(1)}
}
.input-focus{ transition:all .25s ease; }
.input-focus:focus{ transform:scale(1.02); }
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6">

<h2 class="text-2xl font-bold mb-6 text-center text-gray-800">
Membership Registration
</h2>

<div class="space-y-5">

<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-blue-500">person</span>
<input id="name" placeholder="Full Name"
class="w-full border border-gray-300 pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none input-focus">
</div>

<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-green-500">mail</span>
<input id="email" type="email" placeholder="Email Address"
class="w-full border border-gray-300 pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-green-500 outline-none input-focus">
</div>

<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-purple-500">lock</span>
<input id="password" type="password" placeholder="Minimum 6 characters"
class="w-full border border-gray-300 pl-10 pr-10 py-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none input-focus">
<button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-gray-500">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>

<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-indigo-500">verified</span>
<input id="confirmPassword" type="password" placeholder="Confirm Password"
class="w-full border border-gray-300 pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none input-focus">
<p id="matchText" class="text-xs mt-1 text-gray-500">Re-enter your password.</p>
</div>

<button id="registerBtn"
class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-3 rounded-xl font-semibold transition shadow-lg">
Submit Membership Request
</button>

</div>
</div>

<!-- DIALOG -->
<div id="dialogBox" class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50">
<div class="bg-white rounded-2xl shadow-2xl p-6 w-[90%] max-w-sm text-center fade-in">
<div id="dialogIcon" class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4">
<span id="dialogIconSymbol" class="material-symbols-outlined text-4xl"></span>
</div>
<h3 id="dialogTitle" class="text-xl font-bold mb-2"></h3>
<p id="dialogMessage" class="text-gray-600 text-sm mb-6"></p>
<button onclick="closeDialog()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">OK</button>
</div>
</div>

<!-- PROGRESS -->
<div id="progressBox" class="fixed inset-0 hidden items-center justify-center bg-black/40 backdrop-blur-sm z-50">
<div class="bg-white rounded-2xl shadow-2xl p-8 text-center w-[90%] max-w-sm fade-in">
<div class="relative mx-auto w-20 h-20 mb-5">
<div class="absolute inset-0 rounded-full border-4 border-blue-200"></div>
<div class="absolute inset-0 rounded-full border-4 border-blue-600 border-t-transparent animate-spin"></div>
<span class="material-symbols-outlined absolute inset-0 flex items-center justify-center text-blue-600 text-3xl">
cloud_upload
</span>
</div>
<h3 id="progressTitle" class="text-lg font-bold">Processing</h3>
<p id="progressText" class="text-gray-600 text-sm">Please wait...</p>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpNAu49OymCjNuRl7aRBRYQm0P6M0db0s",
  authDomain: "ynhosakote-community.firebaseapp.com",
  projectId: "ynhosakote-community",
  storageBucket: "ynhosakote-community.firebasestorage.app",
  messagingSenderId: "1053474727552",
  appId: "1:1053474727552:web:9ed2d6523ef935fd666865"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.closeDialog = () => {
document.getElementById("dialogBox").classList.add("hidden");
};

function showDialog(type,title,message){
const box=document.getElementById("dialogBox");
const icon=document.getElementById("dialogIcon");
const symbol=document.getElementById("dialogIconSymbol");

document.getElementById("dialogTitle").innerText=title;
document.getElementById("dialogMessage").innerText=message;

if(type==="success"){
icon.className="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-green-100";
symbol.innerText="check_circle";
symbol.className="material-symbols-outlined text-4xl text-green-600";
}
if(type==="error"){
icon.className="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-red-100";
symbol.innerText="error";
symbol.className="material-symbols-outlined text-4xl text-red-600";
}

box.classList.remove("hidden");
box.classList.add("flex");
}

function showProgress(title,text){
document.getElementById("progressTitle").innerText=title;
document.getElementById("progressText").innerText=text;
document.getElementById("progressBox").classList.remove("hidden");
document.getElementById("progressBox").classList.add("flex");
}

function hideProgress(){
document.getElementById("progressBox").classList.add("hidden");
}

window.togglePassword=()=>{
const input=document.getElementById("password");
input.type=input.type==="password"?"text":"password";
};

document.getElementById("confirmPassword").addEventListener("input",()=>{
const password=document.getElementById("password").value;
const confirm=document.getElementById("confirmPassword").value;
const text=document.getElementById("matchText");

if(password===confirm){
text.innerText="Passwords match ✔";
text.className="text-xs mt-1 text-green-600";
}else{
text.innerText="Passwords do not match";
text.className="text-xs mt-1 text-red-600";
}
});

document.getElementById("registerBtn").onclick = async () => {

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();
const confirm = document.getElementById("confirmPassword").value.trim();

if(!name || !email || !password || !confirm){
showDialog("error","Form Error","Please fill all required fields.");
return;
}

if(password !== confirm){
showDialog("error","Password Mismatch","Passwords do not match.");
return;
}

try{

showProgress("Creating Account","Setting up your profile securely...");

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const user = userCred.user;

showProgress("Submitting Request","Saving your membership details...");

await setDoc(doc(db,"users",user.uid),{
name:name,
email:email,
role:"member",
approved:false,
createdAt:serverTimestamp()
});

await signOut(auth);
hideProgress();

showDialog("success","Request Submitted","Your membership request has been sent for approval.");

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("password").value="";
document.getElementById("confirmPassword").value="";

}catch(e){

hideProgress();

let message;

switch(e.code){
case "auth/email-already-in-use":
message="This email is already registered.";
break;
case "auth/invalid-email":
message="Invalid email format.";
break;
case "auth/weak-password":
message="Password must be at least 6 characters.";
break;
case "auth/network-request-failed":
message="Network error. Check internet connection.";
break;
default:
message="Registration failed. Please try again.";
}

showDialog("error","Registration Failed",message);
}

};

</script>
</body>
</html>
